<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI4Media Login Portal</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Application logic script -->
    <script src="app.js"></script>

    <!-- AlpineJS for reactivity -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5', // Indigo 600
                        secondary: '#10B981', // Emerald 500
                        linkedin: '#0A66C2',
                        twitter: '#1DA1F2'
                    }
                }
            }
        }
    </script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased h-screen overflow-hidden" 
      x-data="app()" 
      x-cloak
      @auth-success.window="currentView = 'rss'; loadSources(); loadNews()"
      @auth-logout.window="currentView = 'login'">

    <!-- LOGIN SCREEN -->
    <div x-show="currentView === 'login'" x-transition class="fixed inset-0 bg-gray-50 flex items-center justify-center z-50 transition-colors duration-500" :class="currentPattern">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md relative z-10 border border-gray-100">
            
            <!-- Language toggle in login -->
            <div class="absolute top-4 right-4">
                <button type="button" @click="toggleLang()" class="text-sm font-medium text-gray-500 hover:text-primary transition-colors bg-white px-3 py-1 rounded-full shadow-sm border border-gray-200">
                    <i class="fa-solid fa-language mr-1"></i> <span x-text="lang === 'en' ? 'ES' : 'EN'"></span>
                </button>
            </div>

            <div class="text-center mb-8 mt-4">
                <div class="bg-primary/10 text-primary w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-rocket text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900" x-text="t('login.title')"></h1>
                <p class="text-gray-500 mt-2" x-text="t('login.sub')"></p>
            </div>
            
            <!-- Google Sign-in Button -->
            <button id="google-signin-btn" class="w-full bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-3 rounded-lg transition duration-200 shadow-sm flex items-center justify-center gap-3 mt-4">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span x-text="t('login.google_btn')"></span>
            </button>
            
            <div id="status" class="mt-4 text-center text-sm text-red-500 min-h-[1.25rem]"></div>
        </div>
    </div>

    <!-- MAIN APPLICATION (Appears via view change) -->
    <div x-show="currentView !== 'login'" class="flex h-screen" style="display: none;">
        
        <!-- Sidebar Navigation -->
        <aside :class="isSidebarOpen ? 'w-64 border-r' : 'w-0 border-r-0'" class="bg-white border-gray-200 hidden md:block transition-all duration-300 ease-in-out flex-shrink-0 overflow-hidden relative z-20">
            <div class="w-64 h-full flex flex-col justify-between absolute top-0 left-0 bg-white">
                <div>
                    <div class="h-16 flex items-center justify-between px-6 border-b border-gray-100">
                        <div class="flex items-center">
                            <i class="fa-solid fa-rocket text-primary text-xl mr-3"></i>
                            <span class="text-lg font-bold text-gray-800">AI4Media</span>
                        </div>
                        <button @click="isSidebarOpen = false" class="text-gray-400 hover:text-primary transition-colors p-2 -mr-2 rounded-lg hover:bg-gray-50" title="Collapse Sidebar">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                    </div>
                    <nav class="p-4 space-y-1">
                    <button @click="currentView = 'rss'" :class="{'bg-primary/10 text-primary font-semibold': currentView === 'rss', 'text-gray-600 hover:bg-gray-50': currentView !== 'rss'}" class="w-full flex items-center px-4 py-3 rounded-lg transition-colors">
                        <i class="fa-solid fa-rss w-6 text-center"></i>
                        <span x-text="t('nav.rss')"></span>
                    </button>
                    <button @click="currentView = 'compose'" :class="{'bg-primary/10 text-primary font-semibold': currentView === 'compose', 'text-gray-600 hover:bg-gray-50': currentView !== 'compose'}" class="w-full flex items-center px-4 py-3 rounded-lg transition-colors">
                        <i class="fa-solid fa-pen-nib w-6 text-center"></i>
                        <span x-text="t('nav.compose')"></span>
                    </button>
                    <button @click="currentView = 'scheduled'; loadScheduledPosts()" :class="{'bg-primary/10 text-primary font-semibold': currentView === 'scheduled', 'text-gray-600 hover:bg-gray-50': currentView !== 'scheduled'}" class="w-full flex items-center px-4 py-3 rounded-lg transition-colors">
                        <i class="fa-regular fa-calendar-check w-6 text-center"></i>
                        <span x-text="t('nav.scheduled')"></span>
                    </button>
                    <button @click="currentView = 'stats'" :class="{'bg-primary/10 text-primary font-semibold': currentView === 'stats', 'text-gray-600 hover:bg-gray-50': currentView !== 'stats'}" class="w-full flex items-center px-4 py-3 rounded-lg transition-colors">
                        <i class="fa-solid fa-chart-simple w-6 text-center"></i>
                        <span x-text="t('nav.stats')"></span>
                    </button>
                    <button @click="currentView = 'settings'; loadSettings()" :class="{'bg-primary/10 text-primary font-semibold': currentView === 'settings', 'text-gray-600 hover:bg-gray-50': currentView !== 'settings'}" class="w-full flex items-center px-4 py-3 rounded-lg transition-colors">
                        <i class="fa-solid fa-gear w-6 text-center"></i>
                        <span x-text="t('nav.settings')"></span>
                    </button>
                </nav>
            </div>
            <div class="p-4 border-t border-gray-100 space-y-2">
                <button @click="toggleLang" class="w-full flex items-center px-4 py-2 text-gray-500 hover:text-primary hover:bg-indigo-50 rounded-lg transition-colors">
                    <i class="fa-solid fa-language w-6 text-center"></i>
                    <span x-text="lang === 'en' ? t('nav.switch_es') : t('nav.switch_en')"></span>
                </button>
                <button @click="logout" class="w-full flex items-center px-4 py-2 text-gray-500 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors">
                    <i class="fa-solid fa-arrow-right-from-bracket w-6 text-center"></i>
                    <span x-text="t('nav.logout')"></span>
                </button>
            </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full overflow-hidden bg-gray-50/50 relative">
            
            <!-- Desktop Floating Toggle (When Sidebar is Closed) -->
            <button @click="isSidebarOpen = true" 
                    x-show="!isSidebarOpen"
                    x-transition.opacity.duration.300ms
                    class="hidden md:flex absolute top-8 left-8 z-10 bg-white border border-gray-200 shadow-sm w-10 h-10 rounded-lg items-center justify-center text-gray-500 hover:text-primary hover:bg-gray-50 transition-colors cursor-pointer"
                    title="Expand Sidebar">
                <i class="fa-solid fa-bars text-lg"></i>
            </button>

            <!-- Mobile Header (only visible on small screens) -->
            <header class="md:hidden bg-white h-16 border-b flex items-center justify-between px-4">
                <span class="font-bold text-lg text-gray-800">AI4Media</span>
                <!-- Simple menu (for this prototype uses quick buttons) -->
                <div class="flex space-x-2 text-sm items-center">
                    <button @click="toggleLang()" class="px-2 font-bold text-primary" x-text="lang === 'en' ? 'ES' : 'EN'"></button>
                    <button @click="currentView = 'rss'" class="p-2 text-gray-600"><i class="fa-solid fa-rss"></i></button>
                    <button @click="currentView = 'compose'" class="p-2 text-gray-600"><i class="fa-solid fa-pen"></i></button>
                    <button @click="currentView = 'scheduled'; loadScheduledPosts()" class="p-2 text-gray-600"><i class="fa-regular fa-calendar"></i></button>
                    <button @click="currentView = 'settings'; loadSettings()" class="p-2 text-gray-600"><i class="fa-solid fa-gear"></i></button>
                </div>
            </header>

            <!-- Scrollable views area -->
            <div class="flex-1 overflow-y-auto p-4 transition-all duration-300" :class="isSidebarOpen ? 'md:p-8' : 'md:py-8 md:pr-8 md:pl-24'">
                
                <!-- VIEW: RSS AND NEWS -->
                <div x-show="currentView === 'rss'" x-transition.opacity>
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-gray-800" x-text="t('rss.title')"></h2>
                        <button @click="openSourceModal()" class="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-50 text-sm font-medium flex items-center shadow-sm">
                            <i class="fa-solid fa-plus mr-2"></i> <span x-text="t('rss.add')"></span>
                        </button>
                    </div>

                    <div class="flex flex-col lg:flex-row gap-6">
                        <!-- Left Panel: Categories/Sources Navigation -->
                        <div class="w-full lg:w-1/4">
                            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                                
                                <!-- All News Reset Filter -->
                                <button @click="setFilter('all', null)" 
                                        class="w-full flex items-center px-3 py-2 rounded-lg mb-4 transition-colors font-medium text-sm"
                                        :class="selectedFilter.type === 'all' ? 'bg-primary/10 text-primary' : 'text-gray-600 hover:bg-gray-50'">
                                    <i class="fa-solid fa-layer-group w-5 text-center mr-2"></i>
                                    <span x-text="t('rss.all_news')"></span>
                                </button>

                                <div class="flex justify-between items-center mb-3">
                                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider" x-text="t('rss.cat')"></h3>
                                    <button @click="isCategoryModalOpen = true" class="text-gray-400 hover:text-primary transition-colors p-1" :title="t('rss.add_cat')">
                                        <i class="fa-solid fa-plus"></i>
                                    </button>
                                </div>
                                
                                <ul class="space-y-4">
                                    <template x-for="cat in categories" :key="cat">
                                        <li>
                                            <!-- Category Header -->
                                            <div class="flex justify-between items-center mb-1 group rounded-lg transition-colors cursor-pointer"
                                                 :class="selectedFilter.type === 'category' && selectedFilter.value === cat ? 'bg-indigo-50/50' : 'hover:bg-gray-50'">
                                                <div @click="setFilter('category', cat)" class="flex-1 py-1.5 px-2 flex items-center justify-between">
                                                    <span class="font-bold text-sm" :class="selectedFilter.type === 'category' && selectedFilter.value === cat ? 'text-primary' : 'text-gray-700'" x-text="t('rss.categories.' + cat) || capitalize(cat)"></span>
                                                    <span class="bg-gray-100 text-gray-600 text-[10px] font-bold px-2 py-0.5 rounded-full" :class="selectedFilter.type === 'category' && selectedFilter.value === cat ? 'bg-indigo-100 text-indigo-700' : ''" x-text="getArticlesCountByCategory(cat)"></span>
                                                </div>
                                                <button @click.stop="markAllAsRead('category', cat)" class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-green-500 px-2 py-1 transition-all" :title="t('rss.mark_all_read')">
                                                    <i class="fa-solid fa-check-double text-[11px]"></i>
                                                </button>
                                            </div>

                                            <!-- Sources per category -->
                                            <ul class="space-y-0.5 pl-3 border-l-2 border-gray-100 ml-3">
                                                <template x-for="source in sources.filter(s => s.category === cat)" :key="source.id">
                                                    <li class="group flex justify-between items-center py-1.5 pl-2 pr-1 rounded-lg text-sm transition-colors cursor-pointer"
                                                        :class="selectedFilter.type === 'source' && selectedFilter.value === source.id ? 'bg-indigo-50/80 text-primary font-medium' : 'text-gray-500 hover:bg-gray-50 hover:text-gray-800'"
                                                        @click="setFilter('source', source.id)">
                                                        
                                                        <div class="flex items-center truncate">
                                                            <i class="fa-solid fa-rss mr-2 text-[10px]" :class="selectedFilter.type === 'source' && selectedFilter.value === source.id ? 'text-primary/70' : 'text-gray-300'"></i>
                                                            <span class="truncate" x-text="source.name"></span>
                                                        </div>
                                                        
                                                        <div class="opacity-0 group-hover:opacity-100 flex items-center gap-0.5 text-gray-400 bg-white shadow-sm border border-gray-100 rounded-md px-1 ml-2" @click.stop>
                                                            <button @click="markAllAsRead('source', source.id)" class="p-1 hover:text-green-500 transition-colors" :title="t('rss.mark_all_read')"><i class="fa-solid fa-check-double text-[10px]"></i></button>
                                                            <button @click="openSourceModal(source)" class="p-1 hover:text-primary transition-colors" :title="t('rss.edit_source')"><i class="fa-solid fa-pen text-[10px]"></i></button>
                                                            <button @click="deleteSource(source.id)" class="p-1 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash text-[10px]"></i></button>
                                                        </div>
                                                    </li>
                                                </template>
                                                <!-- Empty state for category -->
                                                <li x-show="sources.filter(s => s.category === cat).length === 0" class="text-xs text-gray-400 italic py-1.5 pl-2">
                                                    <span x-text="t('rss.no_sources')"></span>
                                                </li>
                                            </ul>
                                        </li>
                                    </template>
                                </ul>
                            </div>
                        </div>

                        <!-- Right Panel: Master-Detail Layout -->
                        <div class="w-full lg:w-3/4 flex flex-col gap-4 min-h-[500px]">
                            
                            <!-- Top Half: Preview Panel -->
                            <div class="h-[280px] shrink-0 bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col overflow-y-auto relative">
                                <template x-if="!selectedArticle">
                                    <div class="m-auto flex flex-col items-center justify-center text-gray-400">
                                        <i class="fa-regular fa-newspaper text-5xl mb-4 text-gray-200"></i>
                                        <p class="font-medium text-lg">Select an article to preview</p>
                                    </div>
                                </template>
                                <template x-if="selectedArticle">
                                    <div class="flex flex-col h-full">
                                        <div class="flex justify-between items-start gap-4 mb-3">
                                            <h3 class="text-xl font-bold text-gray-900 leading-tight" x-text="selectedArticle.title"></h3>
                                            <div class="flex items-center gap-2 shrink-0">
                                                <a :href="selectedArticle.url" target="_blank" class="text-gray-500 hover:text-primary p-2 border border-gray-200 rounded-lg hover:bg-gray-50 transition tooltip" title="Read Original">
                                                    <i class="fa-solid fa-external-link-alt"></i>
                                                </a>
                                                <button @click="curateWithAI(selectedArticle)" class="bg-primary hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-sm flex items-center gap-2 whitespace-nowrap">
                                                    <i class="fa-solid fa-wand-magic-sparkles"></i> <span x-text="t('rss.curate_ai')"></span>
                                                </button>
                                                <button @click="curateManual(selectedArticle)" class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-4 py-2 rounded-lg text-sm font-medium transition shadow-sm flex items-center gap-2 whitespace-nowrap">
                                                    <i class="fa-solid fa-pen-nib"></i> <span x-text="t('rss.curate_manual')"></span>
                                                </button>
                                            </div>
                                        </div>
                                        <div class="flex items-center gap-3 text-xs text-gray-500 mb-4 font-medium border-b border-gray-100 pb-3">
                                            <span class="bg-gray-100 px-2 py-1 rounded text-gray-700" x-text="getSourceName(selectedArticle.sourceId)"></span>
                                            <span x-text="formatDate(selectedArticle.publishedAt)"></span>
                                            <button @click="toggleRead(selectedArticle.id)" class="text-gray-400 hover:text-primary ml-auto transition flex items-center gap-1">
                                                <i class="fa-solid" :class="selectedArticle.read ? 'fa-envelope-open' : 'fa-envelope'"></i>
                                                <span x-text="selectedArticle.read ? t('rss.mark_unread') : t('rss.mark_read')"></span>
                                            </button>
                                        </div>
                                        <div class="flex flex-col sm:flex-row gap-4 flex-1">
                                            <img x-show="selectedArticle.imageUrl" :src="selectedArticle.imageUrl" class="w-full sm:w-48 h-32 object-cover rounded-lg border border-gray-100 shrink-0 shadow-sm" alt="Article Preview">
                                            <p class="text-gray-700 text-sm leading-relaxed" x-text="selectedArticle.summary || selectedArticle.description || 'No description available.'"></p>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <!-- Bottom Half: News Table -->
                            <div class="flex-1 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                                <!-- Filter Toggle & Current Filter Status -->
                                <div class="flex justify-between items-end px-5 py-4 border-b border-gray-100 bg-gray-50/50 shrink-0">
                                    <div>
                                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1" x-text="t('rss.filter_by')"></span>
                                        <span class="text-lg font-bold text-gray-800 flex items-center gap-2">
                                            <i class="fa-solid" :class="{'fa-layer-group text-primary': selectedFilter.type === 'all', 'fa-folder-open text-amber-500': selectedFilter.type === 'category', 'fa-rss text-emerald-500': selectedFilter.type === 'source'}"></i>
                                            <span x-text="currentFilterTitle"></span>
                                        </span>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <div class="flex items-center gap-2 text-sm text-gray-600 hidden sm:flex">
                                            <label for="itemsPerPage" class="font-medium" x-text="t('rss.show')"></label>
                                            <select id="itemsPerPage" x-model="itemsPerPage" @change="currentPage = 1" class="border border-gray-200 rounded-lg px-2 py-1 outline-none focus:border-primary shadow-sm bg-white cursor-pointer">
                                                <option value="10">10</option>
                                                <option value="25">25</option>
                                                <option value="50">50</option>
                                                <option value="100">100</option>
                                            </select>
                                        </div>
                                        <button @click="showRead = !showRead; currentPage = 1" class="text-sm font-medium text-primary hover:text-indigo-800 flex items-center gap-2 transition-colors bg-white px-3 py-1.5 rounded-lg border border-gray-200 shadow-sm">
                                            <i class="fa-solid" :class="showRead ? 'fa-eye-slash' : 'fa-eye'"></i>
                                            <span x-text="showRead ? t('rss.hide_read') : t('rss.show_read')"></span>
                                        </button>
                                    </div>
                                </div>
                                
                                <div class="overflow-y-auto flex-1 h-[300px]">
                                    <table class="w-full text-left border-collapse">
                                        <thead class="bg-gray-50 sticky top-0 z-10 shadow-sm border-b border-gray-200">
                                            <tr class="text-xs text-gray-500 uppercase tracking-wider">
                                                <th class="px-6 py-3 font-medium w-1/4" x-text="t('rss.source_name')"></th>
                                                <th class="px-6 py-3 font-medium w-1/2">Title</th>
                                                <th class="px-6 py-3 font-medium w-1/6">Date</th>
                                                <th class="px-6 py-3 font-medium text-center w-1/12">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody class="text-sm divide-y divide-gray-100">
                                            <template x-if="isLoadingNews">
                                                <tr><td colspan="4" class="px-6 py-12 text-center text-gray-500"><i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Loading news...</td></tr>
                                            </template>
                                            <template x-if="!isLoadingNews && newsError">
                                                <tr><td colspan="4" class="px-6 py-12 text-center text-red-500" x-text="newsError"></td></tr>
                                            </template>
                                            <template x-if="!isLoadingNews && !newsError && filteredNews.length === 0">
                                                <tr><td colspan="4" class="px-6 py-12 text-center text-gray-500 italic">No news found for this filter.</td></tr>
                                            </template>
                                            <template x-for="news in paginatedNews" :key="news.id">
                                                <tr @click="selectedArticle = news" 
                                                    class="cursor-pointer transition-colors"
                                                    :class="selectedArticle && selectedArticle.id === news.id ? 'bg-indigo-50/80 border-l-2 border-l-primary' : 'hover:bg-gray-50 border-l-2 border-l-transparent'">
                                                    <td class="px-6 py-3 font-medium text-gray-600 truncate max-w-[150px]" x-text="getSourceName(news.sourceId)"></td>
                                                    <td class="px-6 py-3 font-medium text-gray-900 truncate max-w-[300px]" x-text="news.title"></td>
                                                    <td class="px-6 py-3 text-gray-500 text-xs whitespace-nowrap" x-text="formatDate(news.publishedAt)"></td>
                                                    <td class="px-6 py-3 text-center">
                                                        <span x-show="!news.read" class="inline-block w-2.5 h-2.5 rounded-full bg-blue-500" :title="t('rss.mark_read')"></span>
                                                        <span x-show="news.read" class="inline-block w-2.5 h-2.5 rounded-full bg-gray-300" :title="t('rss.mark_unread')"></span>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                                
                                <!-- Pagination Controls -->
                                <div class="flex flex-col sm:flex-row items-center justify-between px-5 py-3 border-t border-gray-100 bg-gray-50/50 shrink-0 gap-3">
                                    <div class="text-xs text-gray-500">
                                        <span x-text="t('rss.showing')"></span> <span class="font-medium text-gray-700" x-text="filteredNews.length === 0 ? 0 : ((currentPage - 1) * itemsPerPage) + 1"></span> <span x-text="t('rss.to')"></span> <span class="font-medium text-gray-700" x-text="Math.min(currentPage * itemsPerPage, filteredNews.length)"></span> <span x-text="t('rss.of')"></span> <span class="font-medium text-gray-700" x-text="filteredNews.length"></span> <span x-text="t('rss.entries')"></span>
                                    </div>
                                    <div class="flex gap-2">
                                        <button @click="currentPage > 1 ? currentPage-- : null" :disabled="currentPage === 1" class="px-3 py-1.5 border border-gray-200 rounded-lg text-sm font-medium text-gray-600 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm flex items-center gap-1">
                                            <i class="fa-solid fa-chevron-left text-xs"></i> <span x-text="t('rss.prev')"></span>
                                        </button>
                                        <button @click="currentPage < totalPages ? currentPage++ : null" :disabled="currentPage === totalPages || totalPages === 0" class="px-3 py-1.5 border border-gray-200 rounded-lg text-sm font-medium text-gray-600 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm flex items-center gap-1">

                            <div class="flex items-center justify-between mb-4">
                                <h3 class="text-gray-500 font-medium" x-text="t('stats.clicks')"></h3>
                                <div class="w-10 h-10 rounded-full bg-amber-50 text-amber-600 flex items-center justify-center text-lg"><i class="fa-solid fa-link"></i></div>
                            </div>
                            <div class="text-3xl font-bold text-gray-900">892</div>
                            <div class="text-sm text-red-500 font-medium mt-2 flex items-center"><i class="fa-solid fa-arrow-trend-down mr-1"></i> -2% <span class="ml-1" x-text="t('stats.vs_last')"></span></div>
                        </div>
                    </div>

                    <!-- Dummy / Placeholder Chart -->
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <h3 class="font-bold text-gray-800 mb-6" x-text="t('stats.activity')"></h3>
                        <div class="h-64 flex items-end space-x-2 md:space-x-4 border-b border-l border-gray-200 pb-2 pl-2">
                            <!-- Simulated bars -->
                            <template x-for="i in 14">
                                <div class="w-full bg-primary/20 hover:bg-primary transition-colors rounded-t-sm relative group cursor-pointer" :style="`height: ${Math.floor(Math.random() * 80 + 20)}%`">
                                    <div class="absolute -top-8 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white text-xs py-1 px-2 rounded opacity-0 group-hover:opacity-100 whitespace-nowrap"><span x-text="t('stats.day')"></span> <span x-text="i"></span></div>
                                </div>
                            </template>
                        </div>
                        <div class="flex justify-between text-xs text-gray-400 mt-2 pl-2">
                            <span x-text="t('stats.days_ago')"></span>
                            <span x-text="t('stats.today')"></span>
                        </div>
                    </div>
                </div>

                <!-- VIEW: SETTINGS -->
                <div x-show="currentView === 'settings'" x-transition.opacity>
                    <div class="mb-6">
                        <h2 class="text-2xl font-bold text-gray-800" x-text="t('settings.title')"></h2>
                        <p class="text-gray-500" x-text="t('settings.sub')"></p>
                    </div>

                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 max-w-2xl">
                        <h3 class="font-bold text-gray-800 mb-4" x-text="t('settings.social_accounts')"></h3>
                        <div class="space-y-4">
                            <!-- Twitter -->
                            <div class="flex items-center justify-between p-4 border border-gray-100 rounded-lg bg-gray-50">
                                <div class="flex items-center gap-3">
                                    <i class="fa-brands fa-twitter text-3xl" :class="oauthStatus.twitter ? 'text-green-600' : 'text-[#1DA1F2]'"></i>
                                    <div>
                                        <h4 class="font-bold text-gray-800">Twitter (X)</h4>
                                        <p class="text-sm text-gray-500" x-text="oauthStatus.twitter ? t('settings.connected') : t('settings.not_connected')"></p>
                                    </div>
                                </div>
                                <button @click="initOAuth('twitter')" 
                                        class="text-white px-4 py-2 rounded-lg font-medium transition shadow-sm flex items-center gap-2"
                                        :class="oauthStatus.twitter ? 'bg-green-600 hover:bg-green-700' : 'bg-[#1DA1F2] hover:bg-blue-500'">
                                    <span x-text="oauthStatus.twitter ? t('settings.reconnect') : t('settings.connect')"></span>
                                </button>
                            </div>

                            <!-- LinkedIn -->
                            <div class="flex items-center justify-between p-4 border border-gray-100 rounded-lg bg-gray-50">
                                <div class="flex items-center gap-3">
                                    <i class="fa-brands fa-linkedin text-3xl" :class="oauthStatus.linkedin ? 'text-green-600' : 'text-[#0A66C2]'"></i>
                                    <div>
                                        <h4 class="font-bold text-gray-800">LinkedIn</h4>
                                        <p class="text-sm text-gray-500" x-text="oauthStatus.linkedin ? t('settings.connected') : t('settings.not_connected')"></p>
                                    </div>
                                </div>
                                <button @click="initOAuth('linkedin')" 
                                        class="text-white px-4 py-2 rounded-lg font-medium transition shadow-sm flex items-center gap-2"
                                        :class="oauthStatus.linkedin ? 'bg-green-600 hover:bg-green-700' : 'bg-[#0A66C2] hover:bg-blue-700'">
                                    <span x-text="oauthStatus.linkedin ? t('settings.reconnect') : t('settings.connect')"></span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Sources Management Section -->
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mt-8">
                        <div class="flex flex-col md:flex-row justify-between md:items-center gap-4 mb-4">
                            <div>
                                <h3 class="font-bold text-gray-800" x-text="t('settings.sources_manage')"></h3>
                                <p class="text-sm text-gray-500" x-text="t('settings.sources_manage_sub')"></p>
                            </div>
                            <div class="flex items-center gap-2 flex-shrink-0">
                                <button @click="syncNews()" :disabled="isSyncingNews" class="bg-orange-500 hover:bg-orange-600 text-white px-3 py-1.5 rounded-lg text-sm font-medium transition shadow-sm flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                                    <template x-if="!isSyncingNews">
                                        <span><i class="fa-solid fa-sync mr-1"></i> <span x-text="t('settings.sync_now')"></span></span>
                                    </template>
                                    <template x-if="isSyncingNews">
                                        <span><i class="fa-solid fa-circle-notch fa-spin mr-1"></i> <span x-text="t('settings.syncing')"></span></span>
                                    </template>
                                </button>
                                <button @click="expandAllCategories()" class="text-gray-500 hover:text-primary text-xs font-medium px-3 py-1 rounded-md hover:bg-gray-50 transition">
                                    <i class="fa-solid fa-angles-down mr-1"></i> <span x-text="t('settings.expand_all')"></span>
                                </button>
                                <button @click="collapseAllCategories()" class="text-gray-500 hover:text-primary text-xs font-medium px-3 py-1 rounded-md hover:bg-gray-50 transition">
                                    <i class="fa-solid fa-angles-up mr-1"></i> <span x-text="t('settings.collapse_all')"></span>
                                </button>
                                <button @click="openSourceModal()" class="bg-white border border-gray-300 text-gray-700 px-3 py-1.5 rounded-lg hover:bg-gray-50 text-sm font-medium flex items-center shadow-sm">
                                    <i class="fa-solid fa-plus mr-2"></i> <span x-text="t('rss.add')"></span>
                                </button>
                            </div>
                        </div>
                        
                        <div class="overflow-x-auto border border-gray-200 rounded-lg">
                            <table class="w-full text-left">
                                <thead class="bg-gray-50 border-b border-gray-200">
                                    <tr class="text-xs text-gray-500 uppercase tracking-wider">
                                        <th class="px-6 py-3 font-medium" x-text="t('rss.source_name')"></th>
                                        <th class="px-6 py-3 font-medium" x-text="t('settings.last_sync')"></th>
                                        <th class="px-6 py-3 font-medium" x-text="t('settings.unread')"></th>
                                        <th class="px-6 py-3 font-medium" x-text="t('rss.source_tags')"></th>
                                        <th class="px-6 py-3 font-medium text-right" x-text="t('settings.actions')"></th>
                                    </tr>
                                </thead>
                                <template x-if="sources.length === 0">
                                    <tbody class="text-sm">
                                        <tr>
                                            <td colspan="5" class="px-6 py-8 text-center text-gray-500 italic" x-text="t('rss.no_sources')"></td>
                                        </tr>
                                    </tbody>
                                </template>
                                <template x-for="cat in categories" :key="cat">
                                    <tbody class="text-sm">
                                        <!-- Category Row -->
                                        <tr @click="toggleCategory(cat)" class="bg-gray-50/70 hover:bg-gray-100 cursor-pointer border-t border-b border-gray-200">
                                                <td class="px-6 py-3 font-bold text-gray-700">
                                                    <div class="flex items-center gap-3">
                                                        <i class="fa-solid fa-chevron-down transition-transform" :class="!isCategoryExpanded(cat) && '-rotate-90'"></i>
                                                        <span x-text="t('rss.categories.' + cat) || capitalize(cat)"></span>
                                                    </div>
                                                </td>
                                                <td class="px-6 py-3 text-gray-500 font-medium" colspan="4">
                                                    <div class="flex items-center gap-4 text-xs">
                                                        <span>
                                                            <strong class="text-gray-700" x-text="getSourcesForCategory(cat).length"></strong>
                                                            <span class="ml-1" x-text="t('settings.sources_count')"></span>
                                                        </span>
                                                        <span>
                                                            <strong class="text-primary" x-text="getUnreadCountForCategory(cat)"></strong>
                                                            <span class="ml-1" x-text="t('settings.unread')"></span>
                                                        </span>
                                                    </div>
                                                </td>
                                            </tr>
    
                                            <!-- Source Rows (conditionally rendered) -->
                                            <template x-for="source in getSourcesForCategory(cat)" :key="source.id">
                                                <tr x-show="isCategoryExpanded(cat)" x-transition class="border-b border-gray-100 hover:bg-gray-50/50">
                                                    <td class="px-6 py-3 pl-12">
                                                        <div class="font-medium text-gray-800" x-text="source.name"></div>
                                                        <div class="text-xs text-gray-400 truncate max-w-[250px]" :title="source.url" x-text="source.url"></div>
                                                    </td>
                                                    <td class="px-6 py-3 text-xs">
                                                        <div class="flex items-center gap-2">
                                                            <template x-if="source.syncStatus === 'SUCCESS'">
                                                                <i class="fa-solid fa-circle-check text-green-500" :title="t('settings.success')"></i>
                                                            </template>
                                                            <template x-if="source.syncStatus === 'ERROR'">
                                                                <i class="fa-solid fa-circle-exclamation text-red-500" :title="t('settings.sync_error')"></i>
                                                            </template>
                                                            <template x-if="source.syncStatus !== 'SUCCESS' && source.syncStatus !== 'ERROR'">
                                                                <i class="fa-solid fa-circle-minus text-gray-300" :title="t('settings.never')"></i>
                                                            </template>
                                                            <span class="text-gray-500" x-text="formatDate(source.lastSyncTime)"></span>
                                                        </div>
                                                    </td>
                                                    <td class="px-6 py-3">
                                                        <span class="font-bold text-primary" x-text="getUnreadCountForSource(source.id)"></span>
                                                    </td>
                                                    <td class="px-6 py-3 text-gray-500" x-text="source.tags || '-'"></td>
                                                    <td class="px-6 py-3 text-right">
                                                        <div class="flex items-center justify-end gap-2">
                                                            <button @click="openSourceModal(source)" class="p-1.5 text-gray-400 hover:text-primary transition-colors rounded" :title="t('rss.edit_source')">
                                                                <i class="fa-solid fa-pen"></i>
                                                            </button>
                                                            <button @click="deleteSource(source.id)" class="p-1.5 text-gray-400 hover:text-red-500 transition-colors rounded" :title="t('alerts.delete_source')">
                                                                <i class="fa-solid fa-trash"></i>
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            </template>
                                    </tbody>
                                </template>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Category Editor Modal (Hidden by default) -->
            <div x-show="isCategoryModalOpen" style="display: none;" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-50 flex items-center justify-center" x-cloak x-transition>
                <div class="bg-white rounded-xl shadow-xl w-full max-w-sm p-6 relative border border-gray-100" @click.away="isCategoryModalOpen = false">
                    <button @click="isCategoryModalOpen = false" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                    
                    <h3 class="text-xl font-bold text-gray-800 mb-6" x-text="t('rss.add_cat')"></h3>
                    
                    <form @submit.prevent="saveCategory">
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-1" x-text="t('rss.cat_name')"></label>
                            <input type="text" x-model="newCategoryName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="e.g. Design">
                        </div>
                        <div class="flex justify-end gap-3">
                            <button type="button" @click="isCategoryModalOpen = false" class="px-5 py-2.5 text-gray-600 font-medium hover:bg-gray-100 rounded-lg transition" x-text="t('rss.cancel')"></button>
                            <button type="submit" class="px-5 py-2.5 bg-primary text-white font-medium rounded-lg hover:bg-indigo-700 shadow-sm transition" x-text="t('rss.save')"></button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Source Editor Modal (Hidden by default) -->
            <div x-show="isSourceModalOpen" style="display: none;" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-50 flex items-center justify-center" x-cloak x-transition>
                <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6 relative border border-gray-100" @click.away="isSourceModalOpen = false">
                    <button @click="isSourceModalOpen = false" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                    
                    <h3 class="text-xl font-bold text-gray-800 mb-6" x-text="editingSourceId ? t('rss.edit_source') : t('rss.add_source')"></h3>
                    
                    <form @submit.prevent="saveSource">
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1" x-text="t('rss.source_name')"></label>
                            <input type="text" x-model="sourceForm.name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1" x-text="t('rss.source_url')"></label>
                            <input type="url" x-model="sourceForm.url" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1" x-text="t('rss.source_category')"></label>
                            <select x-model="sourceForm.category" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition bg-white">
                                <template x-for="cat in categories" :key="cat">
                                    <option :value="cat" x-text="t('rss.categories.' + cat) || capitalize(cat)"></option>
                                </template>
                            </select>
                        </div>
                        <div class="mb-8">
                            <label class="block text-sm font-medium text-gray-700 mb-1" x-text="t('rss.source_tags')"></label>
                            <input type="text" x-model="sourceForm.tags" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="#AI #Software">
                        </div>
                        <div class="flex justify-end gap-3">
                            <button type="button" @click="isSourceModalOpen = false" class="px-5 py-2.5 text-gray-600 font-medium hover:bg-gray-100 rounded-lg transition" x-text="t('rss.cancel')"></button>
                            <button type="submit" class="px-5 py-2.5 bg-primary text-white font-medium rounded-lg hover:bg-indigo-700 shadow-sm transition" x-text="t('rss.save')"></button>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <!-- Externalized Firebase Auth Integration -->
    <script type="module" src="auth.js"></script>
</body>
</html>
