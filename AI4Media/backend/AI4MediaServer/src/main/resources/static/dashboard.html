<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI4Media Dashboard</title>
    
    <!-- Cargar la lógica en orden antes de AlpineJS -->
    <script type="module">
        import { auth } from "./firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        document.addEventListener('alpine:init', () => {
            Alpine.data('dashboard', () => ({
                scheduleMode: 'specific',
                tagsInput: '',
                selectedNetworks: [],
                post: {
                    userId: '',
                    textContent: '',
                    urlContent: '',
                    scheduledTime: new Date().toISOString().slice(0, 16),
                    tags: '',
                    networks: ''
                },
                message: '',
                status: '',
                token: null,
                twitterConnected: localStorage.getItem('twitterConnected') === 'true',
                linkedinConnected: localStorage.getItem('linkedinConnected') === 'true',
                authMessage: '',
                
                init() {
                    const urlParams = new URLSearchParams(window.location.search);
                    if (urlParams.get('success') === 'true') {
                        const intent = sessionStorage.getItem('oauth_intent');
                        if (intent === 'twitter') {
                            this.twitterConnected = true;
                            localStorage.setItem('twitterConnected', 'true');
                        } else if (intent === 'linkedin') {
                            this.linkedinConnected = true;
                            localStorage.setItem('linkedinConnected', 'true');
                        }
                        this.authMessage = 'Authentication completed successfully!';
                        sessionStorage.removeItem('oauth_intent');
                        window.history.replaceState({}, document.title, window.location.pathname);
                        setTimeout(() => this.authMessage = '', 5000);
                    }

                    onAuthStateChanged(auth, async (user) => {
                        if (user) {
                            this.post.userId = user.uid;
                            this.token = await user.getIdToken();
                        } else {
                            window.location.replace("index.html");
                        }
                    });
                },

                async connectTwitter() {
                    if (!this.token) return;
                    sessionStorage.setItem('oauth_intent', 'twitter');
                    try {
                        const response = await fetch('/api/auth/init-twitter', {
                            headers: { 'Authorization': `Bearer ${this.token}` }
                        });
                        const data = await response.json();
                        if (data.url) {
                            window.location.href = data.url;
                        }
                    } catch (e) {
                        console.error("Error starting Twitter authentication:", e);
                    }
                },

                async connectLinkedin() {
                    if (!this.token) return;
                    sessionStorage.setItem('oauth_intent', 'linkedin');
                    try {
                        const response = await fetch('/api/auth/init-linkedin', {
                            headers: { 'Authorization': `Bearer ${this.token}` }
                        });
                        const data = await response.json();
                        if (data.url) {
                            window.location.href = data.url;
                        }
                    } catch (e) {
                        console.error("Error starting LinkedIn authentication:", e);
                    }
                },

                async schedulePost() {
                    if (!this.token) {
                        this.message = "Authentication required";
                        this.status = "error";
                        return;
                    }
                    
                    if (!this.post.textContent.trim()) {
                        this.message = "Post content is required";
                        this.status = "error";
                        return;
                    }
                    
                    if (this.selectedNetworks.length === 0) {
                        this.message = "You must select at least one target social network.";
                        this.status = "error";
                        return;
                    }

                    this.post.networks = this.selectedNetworks.join('|');
                    this.post.tags = this.tagsInput

                    const payload = {
                        ...this.post                      
                    };

                    if (this.scheduleMode === 'automatic') {
                        payload.scheduledTime = "AUTOMATIC";
                    } else if (this.scheduleMode === 'now') {
                        payload.scheduledTime = "NOW";
                    }

                    try {
                        const response = await fetch('/schedule', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${this.token}`
                            },
                            body: JSON.stringify(payload)
                        });
                        
                        const result = await response.json();
                        
                        if (response.ok) {
                            this.status = 'success';
                            this.message = 'Post scheduled successfully (ID: ' + result.id + ')';
                            this.post.textContent = '';
                            this.post.urlContent = '';
                            this.tagsInput = '';
                            this.selectedNetworks = [];
                            this.post.networks = '';
                            this.scheduleMode = 'specific';
                        } else {
                            this.status = 'error';
                            this.message = result.error || 'Error scheduling the post.';
                        }
                    } catch (error) {
                        console.error("Scheduling Error:", error);
                        this.status = 'error';
                        this.message = 'Network or server error when trying to schedule the post.';
                    }
                },

                async logout() {
                    try {
                        await signOut(auth);
                        // onAuthStateChanged se encargará de hacer el redireccionamiento
                    } catch (error) {
                        console.error("Logout Error:", error);
                    }
                }
            }));
        });
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-8" x-data="dashboard">
    <div class="max-w-4xl mx-auto bg-white rounded shadow p-6">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-bold">Post Scheduler</h1>
            <button @click="logout()" class="text-red-600 hover:text-red-800 text-sm font-semibold">Sign Out</button>
        </div>
        
        <!-- Cuentas Sociales -->
        <div class="mb-8 p-5 bg-gray-50 rounded border">
            <h2 class="text-lg font-semibold mb-4 text-gray-800">Social Accounts</h2>
            <div class="flex space-x-4">
                <!-- Twitter -->
                <button @click="connectTwitter()" class="flex items-center space-x-2 px-4 py-2 rounded text-white transition shadow-sm"
                        :class="twitterConnected ? 'bg-green-600 hover:bg-green-700' : 'bg-black hover:bg-gray-800'">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 22.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                    </svg>
                    <span x-text="twitterConnected ? 'Twitter Connected' : 'Connect Twitter'"></span>
                </button>
                
                <!-- LinkedIn -->
                <button @click="connectLinkedin()" class="flex items-center space-x-2 px-4 py-2 rounded text-white transition shadow-sm"
                        :class="linkedinConnected ? 'bg-green-600 hover:bg-green-700' : 'bg-blue-700 hover:bg-blue-800'">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill-rule="evenodd" d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" clip-rule="evenodd"></path>
                    </svg>
                    <span x-text="linkedinConnected ? 'LinkedIn Connected' : 'Connect LinkedIn'"></span>
                </button>
            </div>
            <div x-show="authMessage" class="mt-4 p-3 bg-green-100 text-green-800 font-medium rounded border border-green-200" x-text="authMessage" x-transition></div>
        </div>

        <!-- Post Form -->
        <div class="mb-8">
            <div class="mb-4">
                <label class="block text-gray-700">Content</label>
                <textarea x-model="post.textContent" class="w-full border p-2 rounded" rows="4"></textarea>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-gray-700 text-sm mb-2 font-semibold">Schedule Mode</label>
                    <div class="flex space-x-4 mb-2">
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="radio" x-model="scheduleMode" value="specific" class="form-radio h-4 w-4 text-blue-600">
                            <span class="text-gray-700 text-sm">Specific time</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="radio" x-model="scheduleMode" value="now" class="form-radio h-4 w-4 text-blue-600">
                            <span class="text-gray-700 text-sm">Now</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="radio" x-model="scheduleMode" value="automatic" class="form-radio h-4 w-4 text-blue-600">
                            <span class="text-gray-700 text-sm">Automatic</span>
                        </label>
                    </div>
                    <div x-show="scheduleMode === 'specific'">
                        <label class="block text-gray-700 text-sm mb-1">Specific date and time</label>
                        <input type="datetime-local" x-model="post.scheduledTime" class="w-full border p-2 rounded">
                    </div>
                </div>
                <div>
                    <label class="block text-gray-700 text-sm mb-1">URL Content</label>
                    <input type="text" x-model="post.urlContent" class="w-full border p-2 rounded" placeholder="https://...">
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 text-sm mb-1">Tags (space-separated)</label>
                <input type="text" x-model="tagsInput" class="w-full border p-2 rounded" placeholder="AI, MachineLearning">
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 text-sm mb-2 font-semibold">Target Social Networks</label>
                <div class="flex space-x-6">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" x-model="selectedNetworks" value="linkedin" class="form-checkbox h-5 w-5 text-blue-700 rounded">
                        <span class="text-gray-700">LinkedIn</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" x-model="selectedNetworks" value="twitter" class="form-checkbox h-5 w-5 text-blue-400 rounded">
                        <span class="text-gray-700">Twitter</span>
                    </label>
                </div>
            </div>

            <button @click="schedulePost()" 
                    :disabled="selectedNetworks.length === 0"
                    class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 disabled:opacity-50 disabled:cursor-not-allowed transition">
                Schedule Post
            </button>

            <div x-show="message" class="mt-4 p-2 rounded" :class="status === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'">
                <span x-text="message"></span>
            </div>
        </div>
    </div>
</body>
</html>
