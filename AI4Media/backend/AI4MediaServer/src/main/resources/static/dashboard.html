<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI4Media Dashboard</title>
    
    <!-- Cargar la lógica en orden antes de AlpineJS -->
    <script type="module">
        import { auth } from "./firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        document.addEventListener('alpine:init', () => {
            Alpine.data('dashboard', () => ({
                isAutomaticSchedule: false,
                tagsInput: '',
                post: {
                    userId: '',
                    textContent: '',
                    urlContent: '',
                    scheduledTime: new Date().toISOString().slice(0, 16),
                    tags: []
                },
                message: '',
                status: '',
                token: null,
                
                init() {
                    onAuthStateChanged(auth, async (user) => {
                        if (user) {
                            this.post.userId = user.uid;
                            this.token = await user.getIdToken();
                        } else {
                            window.location.replace("index.html");
                        }
                    });
                },

                async schedulePost() {
                    if (!this.token) {
                        this.message = "Authentication required";
                        this.status = "error";
                        return;
                    }
                    
                    if (!this.post.textContent.trim()) {
                        this.message = "El contenido del post es obligatorio";
                        this.status = "error";
                        return;
                    }

                    const payload = {
                        ...this.post,
                        tags: this.tagsInput.split(',').map(t => t.trim()).filter(t => t.length > 0)
                    };

                    if (this.isAutomaticSchedule) {
                        payload.scheduledTime = "AUTOMATIC";
                    }

                    try {
                        const response = await fetch('/schedule', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${this.token}`
                            },
                            body: JSON.stringify(payload)
                        });
                        
                        const result = await response.json();
                        
                        if (response.ok) {
                            this.status = 'success';
                            this.message = 'Post planificado con éxito (ID: ' + result.id + ')';
                            this.post.textContent = '';
                            this.post.urlContent = '';
                            this.tagsInput = '';
                        } else {
                            this.status = 'error';
                            this.message = result.error || 'Error al planificar el post.';
                        }
                    } catch (error) {
                        console.error("Scheduling Error:", error);
                        this.status = 'error';
                        this.message = 'Error de red o servidor al intentar planificar el post.';
                    }
                },

                async logout() {
                    try {
                        await signOut(auth);
                        // onAuthStateChanged se encargará de hacer el redireccionamiento
                    } catch (error) {
                        console.error("Logout Error:", error);
                    }
                }
            }));
        });
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-8" x-data="dashboard">
    <div class="max-w-4xl mx-auto bg-white rounded shadow p-6">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-bold">Post Scheduler</h1>
            <button @click="logout()" class="text-red-600 hover:text-red-800 text-sm font-semibold">Sign Out</button>
        </div>
        
        <!-- Post Form -->
        <div class="mb-8">
            <div class="mb-4">
                <label class="block text-gray-700">Content</label>
                <textarea x-model="post.textContent" class="w-full border p-2 rounded" rows="4"></textarea>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="flex items-center space-x-2 text-gray-700 mb-2 cursor-pointer">
                        <input type="checkbox" x-model="isAutomaticSchedule" class="form-checkbox h-4 w-4 text-blue-600">
                        <span>Planificación automática</span>
                    </label>
                    <div x-show="!isAutomaticSchedule">
                        <label class="block text-gray-700 text-sm mb-1">Fecha y hora específica</label>
                        <input type="datetime-local" x-model="post.scheduledTime" class="w-full border p-2 rounded">
                    </div>
                </div>
                <div>
                    <label class="block text-gray-700 text-sm mb-1">URL Content</label>
                    <input type="text" x-model="post.urlContent" class="w-full border p-2 rounded" placeholder="https://...">
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 text-sm mb-1">Tags (separados por coma)</label>
                <input type="text" x-model="tagsInput" class="w-full border p-2 rounded" placeholder="AI, MachineLearning">
            </div>

            <button @click="schedulePost()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                Schedule Post
            </button>

            <div x-show="message" class="mt-4 p-2 rounded" :class="status === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'">
                <span x-text="message"></span>
            </div>
        </div>
    </div>
</body>
</html>
