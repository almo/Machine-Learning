<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI4Media Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 350px;
        }

        h2 {
            color: #333;
            margin-bottom: 1.5rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: opacity 0.2s;
            box-sizing: border-box;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn i {
            margin-right: 10px;
            font-size: 1.2em;
        }

        .btn-twitter {
            background-color: #1DA1F2;
        }

        .btn-linkedin {
            background-color: #0077B5;
        }

        .success-msg {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
            border: 1px solid #c3e6cb;
        }

        #user-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .error-msg {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>
    <div class="card">
        <div id="user-profile" class="user-info">
            <img id="user-photo" src="" alt="Profile">
            <h3 id="user-name">Welcome!</h3>
        </div>

        <h2>Dashboard</h2>
        
        <div id="success-msg" class="success-msg">
            <i class="fas fa-check-circle"></i> Account Connected!
        </div>
        <div id="error-msg" class="error-msg">
            <i class="fas fa-times-circle"></i> Connection Failed!
        </div>

        <p style="color: var(--text-sub); margin-bottom: 20px; font-size: 0.9rem;">
            Connect your social accounts to enable auto-posting.
        </p>
        
        <a id="twitter-link" href="#" class="btn btn-twitter"><i class="fab fa-twitter"></i> Connect Twitter</a>
        <a id="linkedin-link" href="#" class="btn btn-linkedin"><i class="fab fa-linkedin"></i> Connect LinkedIn</a>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        
        <a id="logout-btn" href="#">
            <i class="fas fa-sign-out-alt"></i> Sign Out
        </a>
    </div>
    
    <script type="module">
        import { auth } from "./firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const logoutBtn = document.getElementById('logout-btn');

        // Check URL parameters for success/error flags
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('success') === 'true') {
            document.getElementById('success-msg').style.display = 'block';
        } else if (urlParams.get('success') === 'false' || urlParams.get('error')) {
            document.getElementById('error-msg').style.display = 'block';
        }

        // Lógica de autenticación que ya teníamos
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.body.style.display = "flex";
                if (user.photoURL) {
                    document.getElementById('user-photo').src = user.photoURL;
                }
                if (user.displayName) {
                    document.getElementById('user-name').innerText = "Welcome, " + user.displayName + "!";
                }

                document.getElementById('twitter-link').href = `/login/twitter?userId=${user.uid}`;
                document.getElementById('linkedin-link').href = `/login/linkedin?userId=${user.uid}`;
            } else {
                window.location.replace("index.html");
            }
        });

        // NUEVA: Lógica para cerrar sesión
        logoutBtn.addEventListener('click', (e) => {
            e.preventDefault(); // Evita que el enlace recargue la página
            signOut(auth).then(() => {
                console.log("Sesión cerrada");
                // onAuthStateChanged se encargará de redirigir a index.html automáticamente
            }).catch((error) => {
                console.error("Error al cerrar sesión:", error);
            });
        });
    </script>
</body>

</html>
